name: Agendamento de Build e Sync de CSP do Portfólio

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
    paths:
      - "projects/portfolio/**"
  workflow_dispatch:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: |
          cd projects/portfolio
          npm ci

      - name: Build and Sync CSP
        run: |
          cd projects/portfolio
          npm run build:secure

      - name: Commit and Push CSP Updates
        id: commit_step
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          FILE_PATH="projects/portfolio/vercel.json"

          if git diff --exit-code "$FILE_PATH"; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Nenhuma mudança no CSP detectada."
          else
            git add "$FILE_PATH"
            git commit -m "main: chore (portfolio/hash) - Updated CSP hashes [skip ci]"
            git pull --rebase origin main
            git push origin main
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Este passo garante que a seção de repositórios atualize se o bot NÃO commitar.
      - name: Disparar Deploy Hook (Fallback para Repositórios)
        if: steps.commit_step.outputs.changed == 'false'
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
